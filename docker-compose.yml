services:
  db:
    image: mongo:latest
    container_name: audiobook-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net

  api:
    build: ./api
    container_name: audiobook-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - /data/audiobooks:${AUDIOBOOKS_PATH}
    networks:
      - app_net

  worker:
    build: ./worker
    container_name: audiobook-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - /data/audiobooks:${AUDIOBOOKS_PATH}
    networks:
      - app_net

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    container_name: audiobook-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8100:80"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      GOOGLE_ALLOWED_ORIGINS: ${GOOGLE_ALLOWED_ORIGINS:-}
      APPLE_ALLOWED_ORIGINS: ${APPLE_ALLOWED_ORIGINS:-}
    networks:
      - app_net

networks:
  app_net:

volumes:
  mongo_data:
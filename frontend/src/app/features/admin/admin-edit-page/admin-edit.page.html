		<div class="admin-page">
			<h1>Admin Book Edit</h1>

			<p *ngIf="loading()">Loading book...</p>
			<p *ngIf="error()" class="error">{{ error() }}</p>
			<p *ngIf="success()" class="success">{{ success() }}</p>

			<!-- Metadata section -->
			<app-content-help
				*ngIf="!loading()"
				tooltip="Edit core metadata used by library browsing, search, and playback details."
				anchor="top-right"
				tooltipPlacement="auto"
				size="sm"
			>
			<form (ngSubmit)="saveMetadata()" class="grid">
				<h2>Metadata</h2>
				<app-field-help label="Title" tooltip="Primary display title in all client apps.">
					<input name="title" [(ngModel)]="title" />
				</app-field-help>

				<app-field-help label="Author" tooltip="Author or narrator credit shown on cards and details.">
					<input name="author" [(ngModel)]="author" />
				</app-field-help>

				<app-field-help label="Series" tooltip="Optional series grouping label.">
					<input name="series" [(ngModel)]="series" />
				</app-field-help>

				<app-field-help label="Series Index" tooltip="Book number within the series.">
					<input name="seriesIndex" type="number" [(ngModel)]="seriesIndex" />
				</app-field-help>

				<app-field-help label="Genre" tooltip="Single genre label used in metadata display.">
					<input name="genre" [(ngModel)]="genre" />
				</app-field-help>

				<app-field-help label="Language" tooltip="Primary language used by localization filters.">
					<select name="language" [(ngModel)]="language">
						<option value="en">English</option>
						<option value="fr">French</option>
					</select>
				</app-field-help>

				<app-field-help label="Tags (comma-separated)" tooltip="Used by search and series tag filtering.">
					<input name="tags" [(ngModel)]="tagsRaw" />
				</app-field-help>

				<app-field-help label="Description (default)" tooltip="Fallback description when locale-specific text is absent.">
					<textarea name="description" [(ngModel)]="descriptionDefault"></textarea>
				</app-field-help>

				<button type="submit" class="btn-action" [disabled]="savingMetadata()">
					{{ savingMetadata() ? 'Saving...' : 'Save Metadata' }}
				</button>
			</form>
			</app-content-help>

			<div class="actions" *ngIf="!loading()">
				<label class="cover-upload">
					<span>Replace Embedded Cover</span>
					<input type="file" accept=".jpg,.jpeg,.png,.webp" (change)="onCoverPicked($event)" />
				</label>
				<label class="cover-upload">
					<span>Cover image URL</span>
					<input type="url" placeholder="https://example.com/cover.jpg" name="coverUrl" [(ngModel)]="coverUrlInput" />
				</label>
				<button type="button" class="btn-action" [disabled]="!coverUrlInput.trim()" (click)="useCoverUrl()">
					Use URL
				</button>
				<button type="button" class="btn-action" [disabled]="!selectedCoverFile()" (click)="replaceCover()">
					Upload Cover & Repack
				</button>
				<button type="button" class="btn-action" (click)="extractCover()">Extract Cover</button>
				<button type="button" class="danger" (click)="deleteBook()">Delete Book</button>
			</div>

				<!-- Chapters section at the bottom, collapsible -->
				<section *ngIf="!loading()" class="collapsible-section">
					<button
						type="button"
						class="collapsible-header"
						(click)="chaptersOpen.set(!chaptersOpen())"
						[attr.aria-expanded]="chaptersOpen()"
					>
						<span>Chapters</span>
						<span class="chevron" [class.open]="chaptersOpen()">▶</span>
					</button>

					<form *ngIf="chaptersOpen()" (ngSubmit)="saveChapters()" class="grid collapsible-body">
						<p>Manage chapters with explicit start/end boundaries (milliseconds).</p>

						<table class="chapters-table" *ngIf="chapterRows.length > 0">
							<thead>
								<tr><th>Title</th><th>Start</th><th>End</th><th>Actions</th></tr>
							</thead>
							<tbody>
								<tr *ngFor="let chapter of chapterRows; let i = index">
									<td>
										<input [name]="'chapterTitle' + i" [(ngModel)]="chapter.title" />
									</td>
									<td>
										<input [name]="'chapterStart' + i" type="number" min="0" [(ngModel)]="chapter.start" />
									</td>
									<td>
										<input [name]="'chapterEnd' + i" type="number" min="0" [(ngModel)]="chapter.end" />
									</td>
									<td>
										<button type="button" (click)="removeChapterRow(chapter.id)" [disabled]="chapterRows.length <= 1">
											Remove
										</button>
									</td>
								</tr>
							</tbody>
						</table>

						<p *ngIf="chapterValidationError()" class="error">{{ chapterValidationError() }}</p>

						<div class="chapter-controls">
							<button type="button" class="btn-action" (click)="addChapterRow()">Add Chapter</button>
						</div>

						<button type="submit" class="btn-action" [disabled]="savingChapters()">
							{{ savingChapters() ? 'Saving...' : 'Save Chapters' }}
						</button>
					</form>
				</section>
		</div>

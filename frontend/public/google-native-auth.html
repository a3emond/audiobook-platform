<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StoryWave Google Sign-In</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #eef3f8;
        color: #121417;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(36, 99, 235, 0.16), transparent 45%),
          linear-gradient(180deg, #f9fbfd 0%, #e9f0f7 100%);
      }

      .card {
        width: min(92vw, 360px);
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(30, 58, 110, 0.14);
        border: 1px solid rgba(54, 93, 150, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.5;
        color: #465468;
      }

      .google-button {
        display: grid;
        place-items: center;
        min-height: 44px;
      }

      .status {
        min-height: 1.5em;
        margin-top: 14px;
        font-size: 0.95rem;
        color: #7a2f2f;
      }
    </style>
    <script src="/env.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <main class="card">
      <h1>Continue with Google</h1>
      <p>Sign in with your Google account to continue to StoryWave.</p>
      <div id="googleButton" class="google-button"></div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get('client_id') || window.__env__?.GOOGLE_CLIENT_ID || '';
      const appRedirectUri = params.get('app_redirect_uri') || 'storywave://oauth/google';
      const state = params.get('state') || '';
      const status = document.getElementById('status');
      const googleButton = document.getElementById('googleButton');

      function updateStatus(message) {
        status.textContent = message || '';
      }

      function redirectToApp(values) {
        const target = new URL(appRedirectUri);
        Object.entries(values).forEach(([key, value]) => {
          if (value) {
            target.searchParams.set(key, value);
          }
        });
        window.location.href = target.toString();
      }

      function initializeGoogle() {
        if (!clientId) {
          updateStatus('Google OAuth is not configured for this build.');
          return;
        }

        if (!window.google?.accounts?.id) {
          window.setTimeout(initializeGoogle, 60);
          return;
        }

        window.google.accounts.id.initialize({
          client_id: clientId,
          callback: (response) => {
            const idToken = response?.credential;
            if (!idToken) {
              updateStatus('Google did not return an id_token.');
              return;
            }

            redirectToApp({ id_token: idToken, state });
          },
        });

        window.google.accounts.id.renderButton(googleButton, {
          theme: 'filled_black',
          size: 'large',
          width: 300,
          text: 'continue_with',
        });
      }

      initializeGoogle();
    </script>
  </body>
</html>

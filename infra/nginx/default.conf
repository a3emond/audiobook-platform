server {
  listen 80;
  client_max_body_size 4G;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://api:3000;
  }

  location /streaming/ {
    proxy_pass http://api:3000;
  }

  location /stream/ {
    proxy_pass http://api:3000;
  }
}